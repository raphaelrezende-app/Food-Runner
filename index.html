<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Runner 🏃</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --sky: #87CEEB;
    --ground: #8B5E3C;
    --grass: #5DBB3F;
    --sun: #FFD700;
    --score-bg: rgba(255,255,255,0.85);
    --accent: #FF6B35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: #FFD700;
    text-shadow: 3px 3px 0 #FF6B35, 6px 6px 0 rgba(0,0,0,0.3);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  #game-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 4px #FFD700, 0 0 0 8px #FF6B35;
  }

  canvas {
    display: block;
    background: var(--sky);
  }

  #ui {
    position: absolute;
    top: 12px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    pointer-events: none;
    z-index: 10;
  }

  .badge {
    background: rgba(255,255,255,0.9);
    border-radius: 30px;
    padding: 6px 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #333;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    border: 2px solid #FFD700;
  }

  .badge span { color: #FF6B35; }

  #lives-display { font-size: 1.1rem; }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,30,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { display: none; }

  #overlay-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: #FFD700;
    text-shadow: 3px 3px 0 #FF6B35;
    margin-bottom: 8px;
  }

  #overlay-msg {
    font-size: 1.1rem;
    color: #eee;
    margin-bottom: 6px;
    text-align: center;
    max-width: 340px;
    line-height: 1.5;
  }

  #overlay-score {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #fff;
    margin-bottom: 20px;
  }

  #start-btn {
    background: linear-gradient(135deg, #FFD700, #FF6B35);
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,53,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  }

  #start-btn:hover {
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 10px 28px rgba(255,107,53,0.6);
  }

  #instructions {
    margin-top: 14px;
    color: #aaa;
    font-size: 0.85rem;
    text-align: center;
  }

  #instructions kbd {
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 2px 8px;
    border: 1px solid rgba(255,255,255,0.3);
    color: #FFD700;
    font-family: 'Fredoka One', cursive;
  }
</style>
</head>
<body>

<h1>🍎 Food Runner 🏃</h1>

<div id="game-wrapper">
  <canvas id="canvas" width="700" height="250"></canvas>

  <div id="ui">
    <div class="badge">Pontos: <span id="score-val">0</span></div>
    <div class="badge">Recorde: <span id="hi-val">0</span></div>
    <div class="badge" id="lives-display">❤️❤️❤️</div>
  </div>

  <div id="overlay">
    <div id="overlay-title">Food Runner!</div>
    <div id="overlay-msg">Pegue comidas fresquinhas 🍎🍕🍰<br>e evite comidas estragadas! ☠️🤢</div>
    <div id="overlay-score"></div>
    <button id="start-btn">▶ JOGAR</button>
    <div id="instructions">
      <kbd>Espaço</kbd> ou <kbd>↑</kbd> ou Toque para pular
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const GROUND_Y = H - 50;
const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const BASE_SPEED = 5;

// ─── State ───────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, hi = 0, lives = 3;
let speed = BASE_SPEED;
let frame = 0;
let objects = [];
let clouds = [];
let particles = [];
let spawnTimer = 0;
let spawnInterval = 90;
let bgX1 = 0, bgX2 = W;

// ─── Player ──────────────────────────────────────────────
const player = {
  x: 90, y: GROUND_Y, w: 36, h: 52,
  vy: 0, onGround: true,
  legFrame: 0, legTimer: 0,
  invincible: 0,
  jump() {
    if (this.onGround) { this.vy = JUMP_FORCE; this.onGround = false; }
  }
};

// ─── Emojis ──────────────────────────────────────────────
const GOOD_FOODS = ['🍎','🍕','🍰','🍊','🍓','🌮','🍇','🍑','🍍','🥝','🧁','🍜'];
const BAD_FOODS  = ['🤢','☠️','🦠','🤮','💀','🧟'];
const BAD_LABELS = ['🍎💀','🍕🤢','🍗☠️','🌮🦠'];

// ─── Clouds ──────────────────────────────────────────────
for (let i = 0; i < 5; i++) {
  clouds.push({ x: Math.random() * W, y: 20 + Math.random() * 60, w: 60 + Math.random() * 60, speed: 0.3 + Math.random() * 0.3 });
}

// ─── Spawn ───────────────────────────────────────────────
function spawnObject() {
  const isGood = Math.random() < 0.42;
  const isHigh = Math.random() < 0.35; // some items float high
  const size = 38;

  let yPos;
  if (isHigh) yPos = GROUND_Y - 60;
  else yPos = GROUND_Y;

  const emoji = isGood
    ? GOOD_FOODS[Math.floor(Math.random() * GOOD_FOODS.length)]
    : BAD_FOODS[Math.floor(Math.random() * BAD_FOODS.length)];

  objects.push({
    x: W + 20, y: yPos, w: size, h: size,
    emoji, isGood, wobble: 0,
    // bad ones have a wobble/shake effect
  });
}

// ─── Particle burst ──────────────────────────────────────
function burst(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const spd = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1, color,
      r: 4 + Math.random() * 6
    });
  }
}

// ─── Draw helpers ────────────────────────────────────────
function emoji(text, x, y, size = 32) {
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(text, x, y);
}

function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#5BC8F5');
  sky.addColorStop(1, '#C9E8FB');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Sun
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFE44D';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(W - 60, 50, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const c of clouds) {
    roundRect(c.x, c.y, c.w, 24, 12);
    roundRect(c.x + 10, c.y - 14, c.w - 20, 22, 11);
  }

  // Ground
  const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grd.addColorStop(0, '#8B5E3C');
  grd.addColorStop(1, '#6B3F1E');
  ctx.fillStyle = grd;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Grass strip
  ctx.fillStyle = '#5DBB3F';
  ctx.fillRect(0, GROUND_Y, W, 8);
  // Dashed line on ground
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.setLineDash([18, 18]);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 20);
  ctx.lineTo(W, GROUND_Y + 20);
  ctx.stroke();
  ctx.setLineDash([]);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function drawPlayer() {
  const p = player;
  const cx = p.x + p.w / 2;
  const foot = p.y + p.h;

  // Invincibility flash
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) return;

  // Body
  ctx.fillStyle = '#FF6B35';
  ctx.beginPath();
  ctx.roundRect(cx - 10, foot - 38, 20, 22, 4);
  ctx.fill();

  // Head
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.arc(cx, foot - 46, 13, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#5C2D0A';
  ctx.beginPath();
  ctx.ellipse(cx, foot - 56, 12, 7, 0, Math.PI, 0);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(cx + 3, foot - 50, 4, 4);
  ctx.fillRect(cx - 7, foot - 50, 4, 4);

  // Mouth (smile)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx - 1, foot - 44, 4, 0, Math.PI);
  ctx.stroke();

  // Arms
  const swing = Math.sin(p.legFrame * 0.3) * 18;
  ctx.strokeStyle = '#FDBCB4';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  // Left arm
  ctx.beginPath();
  ctx.moveTo(cx - 10, foot - 34);
  ctx.lineTo(cx - 20, foot - 22 + swing * 0.4);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(cx + 10, foot - 34);
  ctx.lineTo(cx + 20, foot - 22 - swing * 0.4);
  ctx.stroke();

  // Legs
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 6;
  const leg1 = Math.sin(p.legFrame * 0.3) * 18;
  const leg2 = -leg1;

  // Left leg
  ctx.beginPath();
  ctx.moveTo(cx - 5, foot - 16);
  ctx.lineTo(cx - 5 + leg1 * 0.4, foot);
  ctx.stroke();
  // Left shoe
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(cx - 5 + leg1 * 0.4, foot, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Right leg
  ctx.beginPath();
  ctx.moveTo(cx + 5, foot - 16);
  ctx.lineTo(cx + 5 + leg2 * 0.4, foot);
  ctx.stroke();
  // Right shoe
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(cx + 5 + leg2 * 0.4, foot, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawObjects() {
  for (const o of objects) {
    ctx.save();
    if (!o.isGood) {
      // Bad food: red glow
      ctx.shadowColor = 'rgba(200,0,0,0.7)';
      ctx.shadowBlur = 14 + Math.sin(frame * 0.12) * 4;
    } else {
      ctx.shadowColor = 'rgba(100,230,100,0.5)';
      ctx.shadowBlur = 8;
    }
    const bobY = o.isGood ? Math.sin(frame * 0.1 + o.x) * 4 : Math.sin(frame * 0.15 + o.x) * 3;
    emoji(o.emoji, o.x + o.w / 2, o.y + bobY);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLives() {
  const el = document.getElementById('lives-display');
  el.textContent = '❤️'.repeat(lives) + (lives === 0 ? '💀' : '');
}

// ─── Collision ───────────────────────────────────────────
function collides(a, b) {
  const margin = 10;
  return (
    a.x + margin < b.x + b.w - margin &&
    a.x + a.w - margin > b.x + margin &&
    a.y + margin < b.y + b.h &&
    a.y + a.h > b.y + margin
  );
}

// ─── Update ──────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frame++;

  // Speed ramp
  speed = BASE_SPEED + Math.floor(score / 200) * 0.5;
  spawnInterval = Math.max(45, 90 - Math.floor(score / 150) * 5);

  // Clouds
  for (const c of clouds) {
    c.x -= c.speed;
    if (c.x + c.w < 0) c.x = W + 20;
  }

  // Player physics
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
  }

  // Leg animation
  if (player.onGround) {
    player.legTimer++;
    player.legFrame = player.legTimer;
  }

  if (player.invincible > 0) player.invincible--;

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnObject();
    // Sometimes double spawn
    if (Math.random() < 0.2) setTimeout(spawnObject, 300);
  }

  // Objects
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    o.x -= speed;
    if (o.x + o.w < 0) { objects.splice(i, 1); continue; }

    if (collides(player, o)) {
      objects.splice(i, 1);
      if (o.isGood) {
        score += 10;
        burst(o.x + o.w / 2, o.y, '#FFD700', 14);
        showFloatingText('+10', o.x, o.y, '#FFD700');
      } else {
        if (player.invincible === 0) {
          lives--;
          player.invincible = 60;
          burst(player.x + player.w / 2, player.y + player.h / 2, '#FF4444', 18);
          showFloatingText('💀', player.x + player.w / 2, player.y, '#FF4444');
          if (lives <= 0) { endGame(); return; }
        }
      }
      drawLives();
    }
  }

  score++;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.035;
    if (p.life <= 0) particles.splice(i, 1);
  }

  document.getElementById('score-val').textContent = score;
}

// ─── Floating text ───────────────────────────────────────
let floats = [];
function showFloatingText(text, x, y, color) {
  floats.push({ text, x, y, life: 1, color });
}
function drawFloats() {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.color;
    ctx.font = `bold 20px 'Fredoka One', cursive`;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    f.y -= 1.5;
    f.life -= 0.025;
    if (f.life <= 0) floats.splice(i, 1);
  }
  ctx.globalAlpha = 1;
}

// ─── End ─────────────────────────────────────────────────
function endGame() {
  state = 'dead';
  if (score > hi) hi = score;
  document.getElementById('hi-val').textContent = hi;
  document.getElementById('overlay-title').textContent = '😵 Game Over!';
  document.getElementById('overlay-msg').innerHTML = 'Você foi envenenado pela comida estragada! 🤢<br>Tente de novo!';
  document.getElementById('overlay-score').textContent = `Pontuação: ${score} pts`;
  document.getElementById('start-btn').textContent = '🔄 Jogar Novamente';
  document.getElementById('overlay').classList.remove('hidden');
}

function startGame() {
  state = 'playing';
  score = 0; lives = 3; frame = 0; speed = BASE_SPEED;
  objects = []; particles = []; floats = []; spawnTimer = 0; spawnInterval = 90;
  player.y = GROUND_Y; player.vy = 0; player.onGround = true;
  player.invincible = 0; player.legFrame = 0; player.legTimer = 0;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('overlay').classList.add('hidden');
  drawLives();
}

// ─── Render ──────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawObjects();
  drawPlayer();
  drawParticles();
  drawFloats();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ─── Input ───────────────────────────────────────────────
function tryJump() {
  if (state === 'playing') player.jump();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); tryJump(); }
});

canvas.addEventListener('touchstart', e => { e.preventDefault(); tryJump(); }, { passive: false });
canvas.addEventListener('mousedown', tryJump);

document.getElementById('start-btn').addEventListener('click', startGame);

// Init hi score display
document.getElementById('hi-val').textContent = hi;
drawLives();

loop();
</script>
</body>
</html>
